name: Vue Ci

on:
  push:
    branches:
      - main
      - test/ci
  pull_request:
    branches:
      - main
      - test/ci
  workflow_dispatch:

jobs:
    build:
        runs-on:
          - ubuntu-latest
        steps:
          - name: 拉取代码
            uses: actions/checkout@v4

          - name: 安装pnpm
            uses: pnpm/action-setup@v4
            with:
              version: 10.22.0
              run_install: true

          - name: 安装node
            uses: actions/setup-node@v4
            with:
              node-version: 22.14.0
              cache: 'pnpm'

          - name: 构建产物
            run: pnpm run build

          - name: 打包上传
            uses: actions/upload-artifact@v4
            with:
              name: dist
              path: ./dist
              retention-days: 1
