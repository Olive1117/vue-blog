name: Build

on:
  push:
    branches:
      - main
      - ci
  pull_request:
    branches:
      - main
      - ci
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: true

      - name: 安装node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: 'pnpm'

      - name: 构建产物
        run: pnpm run build

      - name: 打包上传
        uses: actions/upload-artifact@v4
        with:
          name: olive-blog-vue-v1
          path: ./dist
          retention-days: 1